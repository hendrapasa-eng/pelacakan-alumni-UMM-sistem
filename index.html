
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alumni Tracker Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🎓 Alumni Tracker UMM</h1>
<p>Sistem Pelacakan Alumni</p>
<button onclick="toggleDarkMode()">Toggle Dark Mode</button>
</header>

<div class="container">

<section class="card">
<h2>Tambah Alumni</h2>

<form id="alumniForm">
<input type="text" id="nama" placeholder="Nama Alumni" required>
<input type="text" id="prodi" placeholder="Program Studi" required>
<input type="number" id="tahun" placeholder="Tahun Lulus" required>
<input type="text" id="kota" placeholder="Kota" required>
<button type="submit">Tambah</button>
</form>

</section>

<section class="card">

<h2>Search Alumni</h2>
<input type="text" id="search" placeholder="Cari nama alumni...">

</section>

<section class="card">

<h2>Daftar Alumni</h2>

<table id="alumniTable">
<thead>
<tr>
<th>Nama</th>
<th>Prodi</th>
<th>Tahun</th>
<th>Kota</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody></tbody>
</table>

</section>

<section class="card">
<h2>Hasil Pelacakan</h2>
<div id="hasil"></div>
</section>

</div>

<footer>
<p>Daily Project Alumni Tracking System</p>
</footer>

<script src="script.js"></script>
</body>
</html>
