<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Alumni</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<script>
// PROTEKSI LOGIN
if(localStorage.getItem("login") !== "true"){
  alert("Login dulu bro!");
  window.location.href="login.html";
}
</script>

<header>
  <h2>Dashboard Alumni</h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card">
<h3>Filter Alumni</h3>

<input id="f_nama" placeholder="Nama">
<input id="f_email" placeholder="Email">
<input id="f_hp" placeholder="No HP">
<input id="f_linkedin" placeholder="LinkedIn">
<input id="f_ig" placeholder="Instagram">
<input id="f_fb" placeholder="Facebook">
<input id="f_tt" placeholder="Tiktok">
<input id="f_kerja" placeholder="Tempat Kerja">
<input id="f_posisi" placeholder="Posisi">
<input id="f_status" placeholder="Status">

<button onclick="applyFilter()">Filter</button>
<button onclick="resetFilter()">Reset</button>

</div>

<div class="card">
<table>
<thead>
<tr>
<th>Nama</th>
<th>Email</th>
<th>No HP</th>
<th>LinkedIn</th>
<th>Kerja</th>
<th>Posisi</th>
<th>Status</th>
</tr>
</thead>

<tbody id="dataAlumni"></tbody>
</table>

<br>
<button onclick="prevPage()">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()">Next</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="script.js"></script>

</body>
</html>
